<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數獨 Sudoku — Premium Puzzle Game</title>
  <meta name="description" content="精美的數獨遊戲，支援多種難度、提示、計時器，享受極致解謎體驗。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0eff8; --surface: rgba(255,255,255,0.75); --surface-hover: rgba(255,255,255,0.90);
      --border: rgba(160,150,210,0.18); --border-strong: rgba(120,100,200,0.30);
      --accent: #7c6efa; --accent2: #fa6e9a; --accent3: #0bbcd4;
      --gold: #e8a20a; --green: #1caa6e; --red: #e53060;
      --text: #2d2648; --text-dim: rgba(45,38,72,0.50);
      --cell-size: 58px; --box-shadow: 0 12px 48px rgba(120,100,200,0.15);
      transition: background 0.6s ease, color 0.6s ease;
    }
    html, body { transition: background 0.6s ease; min-height: 100vh; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    body { background: linear-gradient(135deg, #f0eff8 0%, #faf0f5 50%, #eff6fb 100%); }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 15% 20%, rgba(190,180,255,0.22) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 85% 75%, rgba(255,180,210,0.18) 0%, transparent 55%),
                  radial-gradient(ellipse 50% 50% at 50% 50%, rgba(160,235,255,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: floatOrb 12s ease-in-out infinite; }
    .orb1 { width: 400px; height: 400px; top: -100px; left: -100px; background: rgba(180,165,255,0.20); animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; bottom: -80px; right: -80px; background: rgba(255,160,195,0.18); animation-delay: -4s; }
    .orb3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(140,220,255,0.16); animation-delay: -8s; }
    @keyframes floatOrb { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)} }
    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
    header { text-align: center; margin-bottom: 28px; }
    .logo { display: inline-flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 8px 20px; margin-bottom: 16px; backdrop-filter: blur(20px); }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; padding: 6px; }
    .logo-icon span { background: white; border-radius: 1px; animation: pulse 2s ease-in-out infinite; }
    .logo-icon span:nth-child(2){animation-delay:.2s} .logo-icon span:nth-child(5){animation-delay:.4s} .logo-icon span:nth-child(8){animation-delay:.6s}
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .logo-text { font-size: 1rem; font-weight: 600; letter-spacing: .5px; }
    h1 { font-size: clamp(2rem,5vw,3rem); font-weight: 800; background: linear-gradient(135deg,var(--accent) 0%,var(--accent2) 50%,var(--accent3) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; line-height: 1.1; }
    .subtitle { color: var(--text-dim); font-size: .9rem; margin-top: 6px; }
    .game-layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; }
    .stat-bar { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 18px; backdrop-filter: blur(20px); display: flex; align-items: center; gap: 10px; transition: border-color .3s; }
    .stat-card:hover { border-color: var(--border-strong); }
    .stat-icon { font-size: 1.2rem; }
    .stat-info { display: flex; flex-direction: column; }
    .stat-label { font-size: .7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 600; }
    #timer-val{color:var(--accent3)} #mistakes-val{color:var(--red)} #hints-val{color:var(--gold)} #score-val{color:var(--green)}
    .diff-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .diff-btn { font-family: 'Outfit', sans-serif; font-size: .8rem; font-weight: 600; padding: 7px 16px; border-radius: 50px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer; transition: all .25s; letter-spacing: .5px; }
    .diff-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .diff-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: white; box-shadow: 0 4px 20px rgba(124,110,250,0.4); }
    .board-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; backdrop-filter: blur(30px); box-shadow: var(--box-shadow); }
    #board { display: grid; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(9, var(--cell-size)); gap: 0; border: 2px solid var(--border-strong); border-radius: 12px; overflow: hidden; }
    .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(160,150,210,0.15); position: relative; transition: background .15s, color .15s, transform .1s; user-select: none; background: rgba(255,255,255,0.60); color: var(--text); }
    .cell[data-col="2"],.cell[data-col="5"] { border-right: 2px solid rgba(120,100,200,0.30); }
    .cell[data-row="2"],.cell[data-row="5"] { border-bottom: 2px solid rgba(120,100,200,0.30); }
    .cell.given { color: #2d2648; font-weight: 700; }
    .cell.user-filled { color: var(--accent); }
    .cell.error-persist { color: var(--red) !important; }
    .cell.selected { background: rgba(124,110,250,0.20) !important; z-index: 2; }
    .cell.highlighted { background: rgba(124,110,250,0.08); }
    .cell.same-number { background: rgba(124,110,250,0.13); }
    .cell.error { color: var(--red) !important; background: rgba(229,48,96,0.12) !important; animation: shake .3s ease; }
    .cell.correct-flash { animation: correctFlash .4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    @keyframes correctFlash { 0%{background:rgba(67,224,159,0.3)} 100%{background:transparent} }
    .cell:hover:not(.given) { background: rgba(124,110,250,0.10); }
    .cell-notes { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); gap: 0; width: 100%; height: 100%; padding: 2px; position: absolute; inset: 0; }
    .cell-notes span { font-size: .42rem; font-family: 'JetBrains Mono', monospace; color: var(--accent3); display: flex; align-items: center; justify-content: center; line-height: 1; }
    .side-panel { display: flex; flex-direction: column; gap: 16px; min-width: 200px; }
    .numpad { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; backdrop-filter: blur(30px); }
    .numpad-title { font-size: .72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }
    .numpad-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .num-btn { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 600; width: 100%; aspect-ratio: 1; border: 1px solid var(--border); border-radius: 12px; background: rgba(255,255,255,0.80); color: var(--text); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(120,100,200,0.08); }
    .num-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,var(--accent),var(--accent2)); opacity: 0; transition: opacity .2s; }
    .num-btn:hover::after { opacity: .15; }
    .num-btn:active { transform: scale(.93); }
    .action-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; backdrop-filter: blur(30px); display: flex; flex-direction: column; gap: 8px; }
    .action-title { font-size: .72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; text-align: center; }
    .act-btn { font-family: 'Outfit', sans-serif; font-size: .85rem; font-weight: 600; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.80); color: var(--text); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 8px; letter-spacing: .3px; box-shadow: 0 2px 8px rgba(120,100,200,0.08); }
    .act-btn:hover { background: rgba(255,255,255,0.95); border-color: var(--border-strong); }
    .act-btn:active { transform: scale(.97); }
    .act-btn.primary { background: linear-gradient(135deg,var(--accent),var(--accent2)); border-color: transparent; color: white; box-shadow: 0 4px 16px rgba(124,110,250,0.35); }
    .act-btn.primary:hover { box-shadow: 0 6px 24px rgba(124,110,250,0.5); }
    .act-btn.danger { color: var(--red); }
    .act-btn.notes-active { color: var(--accent3); border-color: var(--accent3); }
    .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 14px 18px; backdrop-filter: blur(30px); }
    .progress-label { display: flex; justify-content: space-between; font-size: .75rem; color: var(--text-dim); margin-bottom: 8px; }
    .progress-track { height: 6px; background: rgba(160,150,210,0.18); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 10px; transition: width .5s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 12px rgba(124,110,250,0.5); width: 0%; }
    .overlay { position: fixed; inset: 0; z-index: 100; background: rgba(200,195,240,0.55); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .35s; }
    .overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: rgba(255,255,255,0.97); border: 1px solid rgba(160,150,210,0.30); border-radius: 28px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 24px 80px rgba(120,100,200,0.18); transform: scale(.85); transition: transform .35s cubic-bezier(.34,1.56,.64,1); }
    .overlay.show .modal { transform: scale(1); }
    .modal-emoji { font-size: 4rem; margin-bottom: 16px; }
    .modal h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .modal p { color: var(--text-dim); margin-bottom: 28px; line-height: 1.6; }
    .modal-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
    .modal-stat { background: rgba(245,243,255,0.90); border: 1px solid rgba(160,150,210,0.18); border-radius: 14px; padding: 12px 18px; display: flex; flex-direction: column; gap: 4px; }
    .modal-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 700; }
    .modal-stat-lbl { font-size: .7rem; color: var(--text-dim); }
    .modal-btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; padding: 14px 32px; border-radius: 50px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; color: white; cursor: pointer; box-shadow: 0 8px 30px rgba(124,110,250,0.4); transition: all .25s; }
    .modal-btn:hover { box-shadow: 0 12px 40px rgba(124,110,250,0.6); transform: translateY(-2px); }
    #toast-container { position: fixed; top: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: rgba(255,255,255,0.97); border: 1px solid rgba(160,150,210,0.28); border-radius: 12px; padding: 12px 18px; font-size: .85rem; font-weight: 500; color: #2d2648; backdrop-filter: blur(20px); box-shadow: 0 8px 30px rgba(120,100,200,0.15); transform: translateX(120%); transition: transform .35s cubic-bezier(.34,1.56,.64,1); display: flex; align-items: center; gap: 8px; }
    .toast.show { transform: translateX(0); }
    .toast.success { border-color: rgba(67,224,159,.4); }
    .toast.error-t { border-color: rgba(255,94,126,.4); }
    .toast.info { border-color: rgba(124,110,250,.4); }
    .confetti-piece { position: fixed; top: -10px; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; z-index: 300; }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
    .act-btn.theme-btn { background: linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff); background-size: 300% 300%; animation: rainbowShift 4s ease infinite; border-color: transparent; color: #fff; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    .act-btn.theme-btn:hover { animation-duration: 1s; box-shadow: 0 6px 24px rgba(255,107,107,0.45); }
    @keyframes rainbowShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    /* ── Mobile-First Responsive System ── */
    @media(max-width:767px){
      /* ── Layout ── */
      #app { padding: 12px 10px 180px; }
      header { margin-bottom: 12px; }
      .logo { padding: 6px 14px; margin-bottom: 8px; }
      .logo-icon { width: 28px; height: 28px; }
      .logo-text { font-size: .85rem; }
      h1 { font-size: 1.6rem; letter-spacing: -.5px; }
      .subtitle { font-size: .75rem; margin-top: 3px; }
      /* ── Difficulty buttons ── */
      .diff-row { gap: 6px; margin-bottom: 12px; }
      .diff-btn { font-size: .72rem; padding: 5px 11px; }
      /* ── Stat bar ── */
      .stat-bar { gap: 6px; margin-bottom: 12px; }
      .stat-card { padding: 7px 10px; gap: 6px; border-radius: 10px; }
      .stat-icon { font-size: .95rem; }
      .stat-label { font-size: .6rem; }
      .stat-value { font-size: .9rem; }
      /* ── Game layout ── */
      .game-layout { flex-direction: column; align-items: center; gap: 10px; }
      /* ── Board ── */
      :root { --cell-size: min(calc((100vw - 40px) / 9), 52px); }
      .board-wrap { padding: 10px; border-radius: 16px; }
      #board { border-radius: 8px; }
      .cell { font-size: clamp(.75rem, 4vw, 1.1rem); }
      .cell-notes span { font-size: clamp(.28rem, 1.2vw, .38rem); }
      /* ── Side panel becomes hidden on mobile (replaced by bottom bar) ── */
      .side-panel { display: none !important; }
      /* ── Mobile bottom toolbar ── */
      #mobile-bar {
        display: flex;
        flex-direction: column;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 50;
        background: rgba(255,255,255,0.96);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid var(--border-strong);
        box-shadow: 0 -8px 32px rgba(120,100,200,0.12);
        padding: 8px 10px max(10px, env(safe-area-inset-bottom));
        gap: 8px;
        transition: background .4s, border-color .4s;
      }
      /* Number pad row */
      #mobile-numpad {
        display: grid;
        grid-template-columns: repeat(9,1fr);
        gap: 5px;
      }
      #mobile-numpad .m-num-btn {
        font-family: 'JetBrains Mono', monospace;
        font-size: clamp(.85rem, 4.5vw, 1.15rem);
        font-weight: 700;
        aspect-ratio: 1;
        width: 100%;
        border: 1.5px solid var(--border-strong);
        border-radius: 10px;
        background: rgba(255,255,255,0.85);
        color: var(--text);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: transform .1s, background .15s;
        box-shadow: 0 2px 6px rgba(120,100,200,0.10);
        -webkit-tap-highlight-color: transparent;
        position: relative; overflow: hidden;
      }
      #mobile-numpad .m-num-btn::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg,var(--accent),var(--accent2));
        opacity: 0; transition: opacity .15s;
      }
      #mobile-numpad .m-num-btn:active { transform: scale(.88); }
      #mobile-numpad .m-num-btn:active::after { opacity: .18; }
      /* Action buttons row */
      #mobile-actions {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      #mobile-actions::-webkit-scrollbar { display: none; }
      #mobile-actions .m-act-btn {
        font-family: 'Outfit', sans-serif;
        font-size: .75rem;
        font-weight: 700;
        white-space: nowrap;
        padding: 8px 13px;
        border-radius: 50px;
        border: 1.5px solid var(--border-strong);
        background: rgba(255,255,255,0.85);
        color: var(--text);
        cursor: pointer;
        display: flex; align-items: center; gap: 5px;
        flex-shrink: 0;
        transition: transform .1s, background .15s;
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 2px 6px rgba(120,100,200,0.10);
      }
      #mobile-actions .m-act-btn:active { transform: scale(.93); }
      #mobile-actions .m-act-btn.primary {
        background: linear-gradient(135deg,var(--accent),var(--accent2));
        border-color: transparent; color: white;
        box-shadow: 0 3px 14px rgba(124,110,250,0.35);
      }
      #mobile-actions .m-act-btn.danger { color: var(--red); }
      #mobile-actions .m-act-btn.notes-active { color: var(--accent3); border-color: var(--accent3); }
      #mobile-actions .m-act-btn.theme-btn {
        background: linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff);
        background-size: 300% 300%;
        animation: rainbowShift 4s ease infinite;
        border-color: transparent; color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      }
      /* Toast moves to top center on mobile */
      #toast-container { right: 50%; transform: translateX(50%); top: 12px; width: 85vw; align-items: center; }
      .toast { transform: translateY(-120%); width: 100%; justify-content: center; }
      .toast.show { transform: translateY(0); }
      /* Modal smaller padding */
      .modal { padding: 32px 20px; }
      .modal-emoji { font-size: 3rem; }
      .modal h2 { font-size: 1.4rem; }
      .modal-stat { padding: 10px 12px; }
      .modal-stat-val { font-size: 1.1rem; }
    }
    /* Desktop: hide mobile bar */
    @media(min-width:768px){
      #mobile-bar { display: none !important; }
    }
    /* Tablet adjustments */
    @media(min-width:620px) and (max-width:767px){
      :root { --cell-size: min(calc((100vw - 60px) / 9), 56px); }
    }
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div id="app">

  <div class="diff-row">
    <button class="diff-btn" id="diff-easy" onclick="setDifficulty('easy')">&#128522; 簡單</button>
    <button class="diff-btn active" id="diff-medium" onclick="setDifficulty('medium')">&#129504; 中等</button>
    <button class="diff-btn" id="diff-hard" onclick="setDifficulty('hard')">&#128293; 困難</button>
    <button class="diff-btn" id="diff-expert" onclick="setDifficulty('expert')">&#128128; 專家</button>
  </div>
  <div class="stat-bar">
    <div class="stat-card"><span class="stat-icon">&#9201;&#65039;</span><div class="stat-info"><span class="stat-label">時間</span><span class="stat-value" id="timer-val">00:00</span></div></div>
    <div class="stat-card"><span class="stat-icon">&#10060;</span><div class="stat-info"><span class="stat-label">錯誤</span><span class="stat-value" id="mistakes-val">0 / 3</span></div></div>
    <div class="stat-card"><span class="stat-icon">&#128161;</span><div class="stat-info"><span class="stat-label">提示</span><span class="stat-value" id="hints-val">3</span></div></div>
    <div class="stat-card"><span class="stat-icon">&#127942;</span><div class="stat-info"><span class="stat-label">分數</span><span class="stat-value" id="score-val">0</span></div></div>
  </div>
  <div class="game-layout">
    <div class="board-wrap"><div id="board"></div></div>
    <div class="side-panel">
      <div class="progress-wrap">
        <div class="progress-label"><span>完成進度</span><span id="progress-pct">0%</span></div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="numpad">
        <div class="numpad-title">輸入數字</div>
        <div class="numpad-grid" id="numpad"></div>
      </div>
      <div class="action-panel">
        <div class="action-title">操作</div>
        <button class="act-btn primary" id="btn-new" onclick="newGame()">&#127922; 新遊戲</button>
        <button class="act-btn theme-btn" id="btn-theme" onclick="changeTheme()">&#127752; 變更色彩</button>
        <button class="act-btn" id="btn-hint" onclick="useHint()">&#128161; 使用提示</button>

function applyTheme(t){
  const r=document.documentElement;
  // Core colors
  r.style.setProperty('--bg',t.bg);
  r.style.setProperty('--accent',t.accent);
  r.style.setProperty('--accent2',t.accent2);
  r.style.setProperty('--accent3',t.accent3);
  r.style.setProperty('--green',t.green);
  r.style.setProperty('--red',t.red);
  r.style.setProperty('--gold',t.gold);
  r.style.setProperty('--text',t.text);
  r.style.setProperty('--text-dim',t.textDim);
  // Surface / border / shadow
  r.style.setProperty('--surface',t.surface);
  r.style.setProperty('--border',t.border);
  r.style.setProperty('--border-strong',t.borderStrong);
  r.style.setProperty('--box-shadow',t.shadow);
  // Body background
  document.body.style.background=t.bodyGrad;
  // Floating orbs
  document.querySelector('.orb1').style.background=t.orb1;
  document.querySelector('.orb2').style.background=t.orb2;
  document.querySelector('.orb3').style.background=t.orb3;
  // Dynamic style tag — body::before gradient + all live-skinned elements
  let styleTag=document.getElementById('dynamic-bg');
  if(!styleTag){styleTag=document.createElement('style');styleTag.id='dynamic-bg';document.head.appendChild(styleTag);}
  styleTag.textContent=`
    body::before{
      background:radial-gradient(ellipse 80% 60% at 15% 20%,${t.orb1} 0%,transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 75%,${t.orb2} 0%,transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 50%,${t.orb3} 0%,transparent 70%);
    }
    .cell{ background:${t.cellBg}; border-color:${t.border}; color:${t.text}; }
    .cell.given{ color:${t.text}; }
    .cell[data-col="2"],.cell[data-col="5"]{ border-right:2px solid ${t.borderStrong}; }
    .cell[data-row="2"],.cell[data-row="5"]{ border-bottom:2px solid ${t.borderStrong}; }
    #board{ border-color:${t.borderStrong}; }
    .num-btn{ background:${t.surface}; color:${t.text}; border-color:${t.border}; }
    .act-btn:not(.primary):not(.danger):not(.notes-active):not(.theme-btn){ background:${t.surface}; color:${t.text}; border-color:${t.border}; }
    .act-btn:hover:not(.primary):not(.theme-btn){ background:${t.surfaceModal}; border-color:${t.borderStrong}; }
    .progress-track{ background:${t.progressTrack}; }
    .overlay{ background:${t.overlayBg}; }
    .modal{ background:${t.surfaceModal}; border-color:${t.borderStrong}; box-shadow:${t.shadowModal}; }
    .modal p,.modal-stat-lbl{ color:${t.textDim}; }
    .modal-stat{ background:${t.modalStatBg}; border:1px solid ${t.modalStatBorder}; }
    .modal-stat-val{ color:${t.text}; }
    .toast{ background:${t.toastBg}; color:${t.toastColor}; border-color:${t.borderStrong}; }
    .stat-card{ background:${t.surface}; border-color:${t.border}; }
    .stat-label{ color:${t.textDim}; }
    .board-wrap,.numpad,.action-panel,.progress-wrap{ background:${t.surface}; border-color:${t.border}; box-shadow:${t.shadow}; }
    .logo{ background:${t.surface}; border-color:${t.border}; }
    .diff-btn:not(.active){ background:${t.surface}; border-color:${t.border}; color:${t.textDim}; }
    .diff-btn:not(.active):hover{ color:${t.text}; border-color:${t.borderStrong}; }
    .numpad-title,.action-title{ color:${t.textDim}; }

    /* Mobile bar */
    #mobile-bar{ background:${t.toastBg}; border-top-color:${t.borderStrong}; }

// ── Sudoku Logic ──
function generateFullBoard(){const b=Array.from({length:9},()=>Array(9).fill(0));solveSudoku(b,true);return b}
function solveSudoku(board,randomize=false){for(let r=0;r<9;r++){for(let c=0;c<9;c++){if(board[r][c]===0){let nums=[1,2,3,4,5,6,7,8,9];if(randomize)nums=shuffle(nums);for(const n of nums){if(isValid(board,r,c,n)){board[r][c]=n;if(solveSudoku(board,randomize))return true;board[r][c]=0}}return false}}}return true}
function isValid(board,r,c,n){for(let i=0;i<9;i++){if(board[r][i]===n&&i!==c)return false;if(board[i][c]===n&&i!==r)return false}const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(board[br+i][bc+j]===n&&(br+i!==r||bc+j!==c))return false}return true}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function countSolutions(board,limit=2){let count=0;function bt(b){for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(b[r][c]===0){for(let n=1;n<=9;n++){if(isValid(b,r,c,n)){b[r][c]=n;bt(b);b[r][c]=0;if(count>=limit)return}}return}}count++}const copy=board.map(r=>[...r]);bt(copy);return count}
const DIFFICULTY={easy:{remove:30,hints:99,maxMistakes:99,initProgress:95},medium:{remove:42,hints:66,maxMistakes:66,initProgress:80},hard:{remove:52,hints:16,maxMistakes:16,initProgress:65},expert:{remove:60,hints:9,maxMistakes:9,initProgress:50}};
function createPuzzle(diff){const solution=generateFullBoard();const puzzle=solution.map(r=>[...r]);const cells=shuffle([...Array(81).keys()]);let removed=0;for(const idx of cells){if(removed>=DIFFICULTY[diff].remove)break;const r=Math.floor(idx/9),c=idx%9;const backup=puzzle[r][c];puzzle[r][c]=0;if(countSolutions(puzzle)===1)removed++;else puzzle[r][c]=backup}return{puzzle,solution}}
let state={puzzle:null,solution:null,board:null,given:null,notes:null,selected:null,mistakes:0,maxMistakes:3,hints:3,score:0,notesMode:false,history:[],elapsed:0,timerInterval:null,difficulty:'medium',solved:false,failed:false};
function newGame(){if(state.timerInterval)clearInterval(state.timerInterval);const diff=state.difficulty;const{puzzle,solution}=createPuzzle(diff);state.puzzle=puzzle;state.solution=solution;state.board=puzzle.map(r=>[...r]);state.given=puzzle.map(r=>r.map(v=>v!==0));state.notes=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));state.selected=null;state.mistakes=0;state.maxMistakes=DIFFICULTY[diff].maxMistakes;state.hints=DIFFICULTY[diff].hints;state.score=0;state.notesMode=false;state.history=[];state.elapsed=0;state.solved=false;state.failed=false;renderBoard();updateStats();updateProgress();updateNotesBtn();state.timerInterval=setInterval(()=>{if(state.solved||state.failed)return;state.elapsed++;updateTimer()},1000)}
function renderBoard(){const el=document.getElementById('board');el.innerHTML='';for(let r=0;r<9;r++)for(let c=0;c<9;c++){const cell=document.createElement('div');cell.className='cell';cell.dataset.row=r;cell.dataset.col=c;cell.id=`cell-${r}-${c}`;if(state.given[r][c]){cell.classList.add('given');cell.textContent=state.board[r][c]}else if(state.board[r][c]!==0){cell.classList.add('user-filled');cell.textContent=state.board[r][c];if(state.board[r][c]!==state.solution[r][c])cell.classList.add('error-persist')}else{const ns=state.notes[r][c];if(ns.size>0){const grid=document.createElement('div');grid.className='cell-notes';for(let n=1;n<=9;n++){const s=document.createElement('span');s.textContent=ns.has(n)?n:'';grid.appendChild(s)}cell.appendChild(grid)}}cell.addEventListener('click',()=>selectCell(r,c));el.appendChild(cell)}}
function renderCell(r,c){const cell=document.getElementById(`cell-${r}-${c}`);if(!cell)return;cell.className='cell';if(state.given[r][c])cell.classList.add('given');else{cell.classList.add('user-filled');if(state.board[r][c]!==0&&state.board[r][c]!==state.solution[r][c])cell.classList.add('error-persist')}cell.innerHTML='';if(state.board[r][c]!==0){cell.textContent=state.board[r][c]}else{const ns=state.notes[r][c];if(ns.size>0){const grid=document.createElement('div');grid.className='cell-notes';for(let n=1;n<=9;n++){const s=document.createElement('span');s.textContent=ns.has(n)?n:'';grid.appendChild(s)}cell.appendChild(grid)}}cell.dataset.row=r;cell.dataset.col=c;cell.addEventListener('click',()=>selectCell(r,c))}
function applyHighlights(){for(let r=0;r<9;r++)for(let c=0;c<9;c++){const cell=document.getElementById(`cell-${r}-${c}`);if(!cell)continue;cell.classList.remove('selected','highlighted','same-number')}if(state.selected===null)return;const[sr,sc]=state.selected;const sv=state.board[sr][sc];for(let r=0;r<9;r++)for(let c=0;c<9;c++){const cell=document.getElementById(`cell-${r}-${c}`);if(!cell)continue;if(r===sr&&c===sc){cell.classList.add('selected');continue}const sameRow=r===sr,sameCol=c===sc;const sameBox=Math.floor(r/3)===Math.floor(sr/3)&&Math.floor(c/3)===Math.floor(sc/3);if(sameRow||sameCol||sameBox)cell.classList.add('highlighted');if(sv!==0&&state.board[r][c]===sv)cell.classList.add('same-number')}}
function selectCell(r,c){state.selected=[r,c];applyHighlights()}
function inputNumber(n){if(state.selected===null||state.solved||state.failed)return;const[r,c]=state.selected;if(state.given[r][c]){toast('此格不可修改','info');return}if(state.notesMode){state.history.push({type:'note',r,c,prev:new Set(state.notes[r][c])});if(state.notes[r][c].has(n))state.notes[r][c].delete(n);else state.notes[r][c].add(n);renderCell(r,c);applyHighlights();return}state.history.push({type:'fill',r,c,prev:state.board[r][c]});state.board[r][c]=n;state.notes[r][c].clear();const cell=document.getElementById(`cell-${r}-${c}`);if(n!==state.solution[r][c]){state.mistakes++;cell.classList.add('user-filled');cell.textContent=n;cell.classList.add('error','error-persist');setTimeout(()=>cell.classList.remove('error'),400);updateStats();if(state.mistakes>=state.maxMistakes){setTimeout(()=>showOverlay('fail-overlay'),500);state.failed=true}toast('錯誤！','error-t')}else{clearNotesSameRCB(r,c,n);cell.classList.add('user-filled');cell.textContent=n;cell.classList.add('correct-flash');setTimeout(()=>cell.classList.remove('correct-flash'),500);state.score+=scorePoints();updateStats();updateProgress();checkWin()}applyHighlights()}
function clearNotesSameRCB(r,c,n){for(let i=0;i<9;i++){state.notes[r][i].delete(n);state.notes[i][c].delete(n)}const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;for(let i=0;i<3;i++)for(let j=0;j<3;j++)state.notes[br+i][bc+j].delete(n)}
function erase(){if(state.selected===null)return;const[r,c]=state.selected;if(state.given[r][c])return;state.history.push({type:'fill',r,c,prev:state.board[r][c]});state.board[r][c]=0;state.notes[r][c].clear();renderCell(r,c);applyHighlights();updateProgress()}
function undo(){if(state.history.length===0){toast('沒有可復原的操作','info');return}const h=state.history.pop();if(h.type==='fill'){state.board[h.r][h.c]=h.prev;renderCell(h.r,h.c)}else{state.notes[h.r][h.c]=new Set(h.prev);renderCell(h.r,h.c)}applyHighlights();updateProgress();toast('已復原','info')}
function toggleNotes(){state.notesMode=!state.notesMode;updateNotesBtn();toast(state.notesMode?'筆記模式開啟':'筆記模式關閉','info')}
function updateNotesBtn(){
  // Desktop
  const btn=document.getElementById('btn-notes');
  btn.classList.toggle('notes-active',state.notesMode);
  btn.textContent=state.notesMode?'✏️ 筆記 ON':'✏️ 筆記模式';
  // Mobile
  const mBtn=document.getElementById('m-btn-notes');
  if(mBtn){
    mBtn.classList.toggle('notes-active',state.notesMode);
    mBtn.innerHTML=state.notesMode?'&#9999;&#65039; 筆記 ON':'&#9999;&#65039; 筆記';
  }
}
function useHint(){if(state.hints<=0){toast('沒有提示了！','error-t');return}const empties=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!state.given[r][c]&&state.board[r][c]===0)empties.push([r,c]);if(empties.length===0)return;const[r,c]=empties[Math.floor(Math.random()*empties.length)];state.hints--;state.score=Math.max(0,state.score-50);state.history.push({type:'fill',r,c,prev:0});state.board[r][c]=state.solution[r][c];state.notes[r][c].clear();clearNotesSameRCB(r,c,state.solution[r][c]);renderCell(r,c);const cell=document.getElementById(`cell-${r}-${c}`);cell.classList.add('correct-flash');setTimeout(()=>cell.classList.remove('correct-flash'),500);selectCell(r,c);updateStats();updateProgress();toast('已填入提示','info');checkWin()}
function checkBoard(){let hasError=false;for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(!state.given[r][c]&&state.board[r][c]!==0&&state.board[r][c]!==state.solution[r][c]){const cell=document.getElementById(`cell-${r}-${c}`);cell.classList.add('error');setTimeout(()=>cell.classList.remove('error'),600);hasError=true}}toast(hasError?'發現錯誤，請修正':'目前填入全部正確！',hasError?'error-t':'success')}
function solveBoard(){for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(!state.given[r][c]){state.board[r][c]=state.solution[r][c];state.notes[r][c].clear()}}state.score=0;renderBoard();updateStats();updateProgress();applyHighlights();toast('已顯示解答（不計分）','info');state.solved=true}
function checkWin(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(state.board[r][c]!==state.solution[r][c])return;state.solved=true;clearInterval(state.timerInterval);setTimeout(()=>{launchConfetti();buildWinStats();showOverlay('win-overlay')},400)}
function buildWinStats(){const el=document.getElementById('win-stats');const t=formatTime(state.elapsed);el.innerHTML=`<div class="modal-stat"><span class="modal-stat-val" style="color:var(--accent3)">${t}</span><span class="modal-stat-lbl">時間</span></div><div class="modal-stat"><span class="modal-stat-val" style="color:var(--red)">${state.mistakes}</span><span class="modal-stat-lbl">錯誤</span></div><div class="modal-stat"><span class="modal-stat-val" style="color:var(--green)">${state.score}</span><span class="modal-stat-lbl">分數</span></div>`}
function setDifficulty(d){state.difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`diff-${d}`).classList.add('active');newGame()}
function updateStats(){document.getElementById('timer-val').textContent=formatTime(state.elapsed);document.getElementById('mistakes-val').textContent=`${state.mistakes} / ${state.maxMistakes}`;document.getElementById('hints-val').textContent=state.hints;document.getElementById('score-val').textContent=state.score}
function updateTimer(){document.getElementById('timer-val').textContent=formatTime(state.elapsed)}
function updateProgress(){const initPct=DIFFICULTY[state.difficulty].initProgress;let given=0,extra=0;for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(state.given[r][c])given++;else if(state.board[r][c]!==0&&state.board[r][c]===state.solution[r][c])extra++}const blanks=81-given;const pct=blanks===0?100:Math.min(100,Math.round(initPct+(extra/blanks)*(100-initPct)));document.getElementById('progress-fill').style.width=pct+'%';document.getElementById('progress-pct').textContent=pct+'%'}
function scorePoints(){const base={easy:5,medium:10,hard:15,expert:25}[state.difficulty];const timeBonus=Math.max(0,300-state.elapsed);return base+Math.floor(timeBonus/10)}
function formatTime(s){const m=Math.floor(s/60).toString().padStart(2,'0');const sec=(s%60).toString().padStart(2,'0');return `${m}:${sec}`}
function showOverlay(id){document.getElementById(id).classList.add('show')}
function closeOverlay(){document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show'))}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeOverlay()}));
function toast(msg,type='info'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.getElementById('toast-container').appendChild(t);requestAnimationFrame(()=>{requestAnimationFrame(()=>t.classList.add('show'))});setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400)},2200)}
function buildNumpad(){const np=document.getElementById('numpad');np.innerHTML='';for(let n=1;n<=9;n++){const btn=document.createElement('button');btn.className='num-btn';btn.id=`num-btn-${n}`;btn.textContent=n;btn.addEventListener('click',()=>inputNumber(n));np.appendChild(btn)}}
document.addEventListener('keydown',e=>{if(state.selected===null)return;const[r,c]=state.selected;if(e.key>='1'&&e.key<='9'){inputNumber(parseInt(e.key));return}if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){erase();return}const moves={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};if(moves[e.key]){e.preventDefault();const[dr,dc]=moves[e.key];const nr=Math.max(0,Math.min(8,r+dr)),nc=Math.max(0,Math.min(8,c+dc));selectCell(nr,nc)}if(e.key==='z'&&(e.ctrlKey||e.metaKey))undo();if(e.key==='n')toggleNotes();if(e.key==='h')useHint()});
function launchConfetti(){const colors=['#7c6efa','#fa6e9a','#6ef7fa','#f9c74f','#43e09f','#fff'];for(let i=0;i<120;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';const size=Math.random()*10+5;el.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*.5}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)},i*15)}}
buildNumpad();newGame();
</script>
